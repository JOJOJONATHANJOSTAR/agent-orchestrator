name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      # Windows runner 默认 cp1252，强制 UTF-8 以免打印 ✅/🎉 等字符时崩
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
    steps:
      - uses: actions/checkout@v4

      - name: Configure git identity (dry-run 的每轮快照 git stash create 需要)
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, with dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Byte-compile all sources
        run: python -m compileall orchestrator scripts claude_codex_orchestrator.py

      - name: Run test suite
        run: python tests/test_optimizations.py

      - name: Smoke — orchestrator dry-run (fakes, no real claude/codex needed)
        run: agent-orchestrate "cross-platform smoke test" --dry-run
